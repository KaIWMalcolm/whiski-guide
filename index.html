/* === ISLAY === */
{n:"Ardbeg 10 YO",r:"Islay",a:10,v:46.0,p:9.00,f:["peated","smoky","coastal","vanilla"],t:"The benchmark Ardbeg — colossal peat smoke with an antiseptic medicinal edge, followed by layers of dark chocolate, espresso and bonfire ash. Underneath all that intensity sits a surprisingly sweet vanilla and malt backbone that keeps you coming back for more.",rec:"Anyone asking for classic Islay smoke. A perfect starting point for exploring the Ardbeg range and one of the best value peated malts anywhere."},
{n:"Ardbeg An Oa",r:"Islay",a:null,v:46.6,p:8.80,f:["peated","smoky","sweet","vanilla","fruity"],t:"Smoother and more rounded than the 10 — Pedro Ximénez and new charred oak casks contribute layers of dark toffee, stewed plum and caramel over the signature Ardbeg peat smoke. The finish lingers with cocoa and dried fig. The most approachable expression in the range.",rec:"Customers who want classic Islay smoke but crave a little more sweetness and body. An excellent bridge for those coming from sherried or sweet whisky styles."},
{n:"Ardbeg Ardcore 46%",r:"Islay",a:null,v:46.0,p:16.90,f:["peated","smoky","spicy","citrus"],t:"Heavily peated and rebellious — sharp green citrus, cracked black pepper, raw brine and a distinctly punky attitude. This is Ardbeg at its most untamed and confrontational, with roasted barley adding a biscuity edge.",rec:"Peat-heads wanting something unusual and aggressive. Regular Islay drinkers seeking a new challenge."},
{n:"Ardbeg Corryvreckan",r:"Islay",a:null,v:57.1,p:16.00,f:["peated","smoky","spicy","chocolatey","fruity"],t:"Named after Scotland's famous whirlpool — dark and supremely powerful. Dense tar, bitter dark chocolate, cracked black pepper and dried sultana wrapped in an unrelenting blanket of French oak-influenced smoke. At 57% this demands respect and rewards patience with water.",rec:"Confident whisky drinkers who want bold, full-proof Islay character. Those who loved the 10 and are ready for a dramatic step up in intensity."},
{n:"Ardbeg Eureka",r:"Islay",a:null,v:52.2,p:18.00,f:["peated","smoky","tropical","citrus"],t:"A limited expression that surprises at every turn — bright pineapple, ripe mango and passion fruit dance over the signature Ardbeg campfire smoke and maritime tar. Complex, unexpected and endlessly fascinating.",rec:"Whisky enthusiasts exploring the Ardbeg range who appreciate surprising flavour combinations. A wonderful conversation piece."},
{n:"Ardbeg Smokiverse",r:"Islay",a:null,v:48.3,p:13.00,f:["peated","smoky","spicy","coastal"],t:"Among the smokiest in the entire Ardbeg range — a thick blanket of mossy, earthy peat layered with heavy brine, smouldering driftwood, anise and eucalyptus. Remarkably intense even by Islay standards.",rec:"Serious peat devotees chasing maximum smoky intensity. If someone asks for 'the smokiest thing you've got', this is a strong contender."},
{n:"Ardbeg Uigeadail",r:"Islay",a:null,v:54.2,p:12.50,f:["peated","smoky","sherried","chocolatey","rich"],t:"The fan favourite — named after Ardbeg's water source loch. Old Oloroso sherry casks contribute rich dark sultanas, Christmas cake, treacle toffee and burnt orange peel over massive peat smoke. Full proof, endlessly rewarding and often regarded as one of the greatest Islay whiskies ever bottled.",rec:"Anyone who loves both smoke AND sherry richness in equal measure. Brilliant for experienced drinkers and a whisky that converts sceptics."},
{n:"Ardbeg Wee Beastie",r:"Islay",a:5,v:47.4,p:9.00,f:["peated","smoky","coastal","spicy"],t:"Young, feisty and gloriously raw — only 5 years old but bursting with character that shames many older malts. Barbecue char, sea spray, crushed green herbs and a fiery spirit kick. The distillery character shines through with zero filter.",rec:"Customers wanting to taste the raw, youthful energy of Islay whisky at its most primal. Peat fans after something edgy and great value."},
{n:"Bowmore 12 YO",r:"Islay",a:12,v:40.0,p:8.90,f:["peated","smoky","fruity","floral","coastal"],t:"Bowmore's elegant calling card — arguably the sweetest and most floral of all the classic Islays. Gentle lavender-tinged peat smoke balanced beautifully with heather honey, lemon curd and a whisper of dark chocolate on the long, warming finish.",rec:"A brilliant starting Islay for the curious — especially those who appreciate subtlety over brute force. Pairs wonderfully with chocolate desserts."},
{n:"Bowmore 15 YO",r:"Islay",a:15,v:43.0,p:12.90,f:["peated","smoky","sherried","fruity","coastal"],t:"Richer and more complex than the 12 — sherry influence adds generous dried fruit, warm cinnamon spice and a layer of sticky toffee over the integrated maritime smoke. The coastal character mellows into something deeply comforting.",rec:"Bowmore fans stepping up, or sherry enthusiasts who enjoy a gentle smoky accompaniment to their dried fruit and spice."},
{n:"Bowmore 18 YO",r:"Islay",a:18,v:43.0,p:20.50,f:["peated","smoky","sherried","rich","coastal"],t:"Significantly more refined — deep dried fig, walnut oil, aged leather and vintage oak with only a graceful wisp of distant smoke. Complex, elegant and one of the most sophisticated expressions Islay produces.",rec:"Premium choices, celebratory occasions, or seasoned whisky lovers wanting to experience mature Islay elegance at its finest."},
{n:"Bruichladdich Classic Laddie",r:"Islay",a:null,v:50.0,p:9.50,f:["light","floral","fruity","grassy","citrus"],t:"Famously UNPEATED Islay — a revelation for those who think Islay means smoke. Bright coastal barley freshness, orchard blossom, ripe pear, vanilla cream and a zesty lemon finish. Bruichladdich lets the terroir sing without a shred of peat.",rec:"People who say 'I don't like peaty whisky' but want to try something from Islay. A genuine eye-opener that reframes what the island can produce."},
{n:"Bruichladdich Scottish Barley",r:"Islay",a:null,v:50.0,p:11.00,f:["light","fruity","floral","citrus","grassy"],t:"A celebration of single Scottish barley provenance — silky cream, fresh garden pear, heather honey and bright citrus on a bed of clean malt. Demonstrates what Islay can achieve when the focus is entirely on grain character rather than peat.",rec:"Whisky enthusiasts interested in terroir and provenance. Those who want zero smoke and maximum distillery character."},
{n:"Bruichladdich Port Charlotte",r:"Islay",a:null,v:50.0,p:12.00,f:["peated","smoky","coastal","vanilla","fruity"],t:"The heavily peated arm of Bruichladdich — big billowing smoke with a remarkably sweet and creamy vanilla backbone underneath. Sea brine, toasted barley and smouldering driftwood create a peated whisky that feels both powerful and approachable simultaneously.",rec:"Customers wanting heavily peated whisky that still feels balanced and accessible. A superb alternative to Laphroaig or Ardbeg with its own distinct personality."},
{n:"Bunnahabhain Stiuireadair",r:"Islay",a:12,v:46.3,p:8.90,f:["sherried","fruity","nutty","coastal","light"],t:"UNPEATED Islay that's all about elegant sherry influence — dried apricot, toasted almond, rich dark chocolate and a gentle sea-salt coastal breeze. Smooth, generous and deeply satisfying without a trace of peat.",rec:"People who think they can't enjoy Islay because of smoke — this is the antidote. Shows Islay's coastal character through a completely different lens."},
{n:"Bunnahabhain 12 Cask Strength",r:"Islay",a:12,v:60.1,p:13.50,f:["sherried","rich","fruity","spicy","coastal"],t:"Full proof and concentrated — dense sherry, Christmas-cake raisin, candied orange peel, building ginger spice and salted caramel. Add a few drops of water and watch it blossom into something extraordinary.",rec:"Cask strength enthusiasts who love sherry-driven whisky. Outstanding value for the intensity and complexity on offer."},
{n:"Bunnahabhain 25 YO",r:"Islay",a:25,v:43.0,p:75.00,f:["sherried","rich","fruity","nutty","chocolatey"],t:"A quarter century of careful maturation — deep mahogany, dried fig, walnut, old library leather, Christmas cake with marzipan and an impossibly gentle oak spice on a finish that lasts for minutes.",rec:"Premium celebration drams. For whisky connoisseurs or customers with budget for something truly special and utterly memorable."},
{n:"Caol Ila 12 YO",r:"Islay",a:12,v:43.0,p:9.90,f:["peated","smoky","coastal","citrus","light"],t:"The most elegant of the classic Islays — lighter, cleaner smoke than Lagavulin or Laphroaig, almost like sea mist rolling over citrus groves. Bright green apple, lemon oil, ocean breeze and a soft, refined peat character.",rec:"An excellent entry-level Islay. Perfect for those who find Laphroaig 'too much' but still want genuine peated character."},
{n:"Caol Ila Moch",r:"Islay",a:null,v:43.0,p:10.50,f:["peated","smoky","citrus","floral","light"],t:"Moch means 'dawn' in Gaelic — lighter and more ethereal than the 12, like the first light of morning over the Sound of Islay. Delicate white pepper, fresh citrus blossom and smoke as gentle as sea mist.",rec:"Islay fans wanting something refined and subtle. An excellent whisky for converting those who claim they don't enjoy smoke."},
{n:"Kilchoman Sanaig",r:"Islay",a:null,v:46.0,p:11.50,f:["peated","smoky","sherried","rich","coastal"],t:"Sherry-dominant Kilchoman — bold dark fruit, bitter orange chocolate and generous peat smoke intertwined with Oloroso and PX cask sweetness. Richly layered and deeply satisfying with genuine farmhouse character.",rec:"Customers who love both sherry AND smoke in equal measure. Uigeadail fans will find a kindred spirit here."},
{n:"Kilchoman Loch Gorm",r:"Islay",a:null,v:46.0,p:12.00,f:["peated","smoky","sherried","fruity","spicy"],t:"Exclusively Oloroso sherry matured — concentrated dark sultana, Christmas spice and the distinctive Kilchoman farmyard peat underneath. The sherry takes the lead while the peat provides a powerful supporting role.",rec:"Sherry lovers wanting an Islay twist with genuine artisan farm distillery character. Premium feel that over-delivers for the price."},
{n:"Kilchoman Machir Bay",r:"Islay",a:null,v:46.0,p:9.50,f:["peated","smoky","vanilla","citrus","coastal"],t:"Kilchoman's flagship expression — a marriage of bourbon and sherry casks delivering bright vanilla, sharp lemon zest and classic farm-distilled peat smoke. Young, vibrant and bursting with coastal energy. Scotland's farm distillery at its most quintessential.",rec:"A fantastic introduction to Kilchoman and the artisan farm distillery movement. Outstanding value for a handcrafted peated Islay."},
{n:"Kilchoman 100% Islay",r:"Islay",a:null,v:46.0,p:12.50,f:["peated","smoky","grassy","coastal"],t:"Truly grain-to-glass — barley grown, malted, distilled, matured and bottled entirely on the island. Grassy, barley-forward with fresh coastal peat and a bright citrus finish. You're tasting Islay terroir in its purest form.",rec:"Whisky enthusiasts passionate about provenance and terroir. A remarkable conversation piece and a completely unique product."},
{n:"Lagavulin 8 YO",r:"Islay",a:8,v:48.0,p:12.00,f:["peated","smoky","coastal","vanilla","spicy"],t:"Younger and more energetic than the legendary 16 — intensely peated with raw coastal power and more vanilla sweetness underneath. The shorter maturation lets the distillery's fierce smoky character shine unfiltered.",rec:"Lagavulin fans wanting to compare styles. Those who crave fierce, youthful Islay smoke with real bite."},
{n:"Lagavulin 11 YO Sweet Peat",r:"Islay",a:11,v:43.0,p:15.00,f:["peated","smoky","sweet","fruity","vanilla"],t:"Finished in charred American oak — softer, gentler peat beautifully balanced with butterscotch caramel, vanilla custard and tropical fruit sweetness. Proves that Lagavulin can whisper as powerfully as it shouts.",rec:"Those who find the 16 too austere or drying. Bridges the gap between sweet and smoky whisky styles elegantly."},
{n:"Lagavulin 16 YO",r:"Islay",a:16,v:43.0,p:14.00,f:["peated","smoky","rich","coastal"],t:"The undisputed king of Islay — sixteen years of patient maturation create impossibly dense, rounded and almost medicinal peat smoke. Dark plum, maritime tar, sea salt, bonfire embers and an immense finish that lingers for what feels like minutes. A whisky of genuine legend.",rec:"When someone asks for 'the best Islay' or 'the most famous peated whisky'. This is the answer that never disappoints."},
{n:"Lagavulin Tequila Cask",r:"Islay",a:12,v:56.4,p:25.00,f:["peated","smoky","spicy","tropical","vanilla"],t:"An audacious experiment — finished in ex-tequila casks, combining Lagavulin's legendary peat smoke with bright agave sweetness, tropical fruit and roasted earthy spice. Full proof and unapologetically bold.",rec:"Adventurous drinkers who appreciate flavour innovation, or tequila lovers curious about how agave and peat interact."},
{n:"Laphroaig 10 YO",r:"Islay",a:10,v:40.0,p:9.00,f:["peated","smoky","coastal","sweet"],t:"The world's most polarising whisky — boldly medicinal peat smoke, iodine, seaweed wrack and bonfire ash hit you immediately. Then a surprising wave of vanilla sweetness, caramel and maritime saltiness emerges. You either love it passionately or run from the room. There is no middle ground.",rec:"When someone asks for 'the smokiest, most intense whisky you have'. The gold standard of peated Scotch and one of the most iconic bottles on earth."},
{n:"Laphroaig Quarter Cask",r:"Islay",a:null,v:48.0,p:10.50,f:["peated","smoky","vanilla","spicy","coastal"],t:"Matured in smaller quarter casks for accelerated oak interaction — adds generous coconut, creamy vanilla and caramel over the classic Laphroaig medicinal smoke and iodine. Richer, sweeter and more immediately rewarding than the 10.",rec:"Laphroaig fans who want extra richness and body, or bourbon lovers making their first expedition into peated Islay territory."},
{n:"Laphroaig Select",r:"Islay",a:null,v:40.0,p:8.50,f:["peated","smoky","sweet","vanilla","coastal"],t:"The most approachable Laphroaig available — a blend of different cask types creates lighter, sweeter smoke with more vanilla and less of the classic iodine intensity. The gentle introduction to a powerful distillery.",rec:"Best first step into Laphroaig for nervous beginners. Genuinely peaty but not terrifying."},
{n:"Laphroaig Lore",r:"Islay",a:null,v:48.0,p:16.00,f:["peated","smoky","rich","sherried","coastal"],t:"The most complex Laphroaig expression — a vatting of various aged casks including quarter casks and Oloroso sherry. Intensely layered smoke, dried stone fruit, bitter dark chocolate, old leather and a finish of profound depth and length.",rec:"Premium choice for experienced Laphroaig devotees. The full, uncompromising Laphroaig experience from every angle."},
{n:"Smokehead High Voltage",r:"Islay",a:null,v:58.0,p:11.00,f:["peated","smoky","spicy","coastal"],t:"Islay single malt at uncompromising cask strength — punchy, fiercely peated and aggressively maritime. Sea brine, hot tar, white pepper and raw peat smoke. Not for the faint-hearted, but remarkable value at this strength.",rec:"Peat fanatics chasing full-throttle Islay intensity at outstanding value. Brilliant with a few drops of water."},
{n:"Smokehead Sherry Bomb",r:"Islay",a:null,v:48.0,p:12.90,f:["peated","smoky","sherried","rich","fruity"],t:"Islay malt given the full sherry treatment — rich Christmas pudding, plump raisin and dark cherry over heavy peat smoke. Indulgent, luscious and unashamedly over the top in the best possible way.",rec:"Customers who refuse to choose between smoke and sherry. A hedonistic combination of two of whisky's great flavour worlds."},
{n:"Smokehead Tequila Cask",r:"Islay",a:null,v:43.0,p:9.90,f:["peated","smoky","tropical","spicy"],t:"Finished in ex-tequila casks — bright agave sweetness, lime zest and green chilli over classic Islay peat smoke. An intriguing and unusual combination that works surprisingly well.",rec:"Adventurous drinkers and tequila fans curious about whisky crossover flavours."},

/* === HIGHLANDS === */
{n:"Aberfeldy 12 YO",r:"Highlands",a:12,v:40.0,p:8.90,f:["honeyed","fruity","waxy","citrus","floral"],t:"Aberfeldy's signature is real honey — bees live on the distillery grounds and it shows. Waxy golden texture, fresh blood orange, Jersey cream and gentle cinnamon spice. Sweet, inviting and wonderfully rounded.",rec:"Customers wanting a sweet, approachable Highland malt that feels genuinely premium. Fantastic for those new to whisky who appreciate honeyed flavours."},
{n:"Aberfeldy 15 YO",r:"Highlands",a:15,v:40.0,p:10.50,f:["honeyed","fruity","waxy","spicy","rich"],t:"The honey and wax deepen significantly — candied orange peel, beeswax, dried apricot and a warming ginger spice that builds with each sip. More complexity and confidence than the 12.",rec:"Aberfeldy fans ready to step up, or anyone wanting a richer, more developed honeyed Highland character."},
{n:"Aberfeldy 18 YO",r:"Highlands",a:18,v:43.0,p:19.50,f:["honeyed","rich","sherried","fruity","spicy"],t:"Full sherry cask influence takes the reins — rich dark fruit, toffee apple, toasted walnut and the unmistakable Aberfeldy honey creating a luxurious, deeply satisfying dram.",rec:"Special occasion Highland whisky for fans of sweet, rich, aged malts. Outstanding quality for the price point."},
{n:"Ancnoc 12 YO",r:"Highlands",a:12,v:40.0,p:7.90,f:["fruity","honeyed","floral","light","citrus"],t:"From Knockdhu distillery — fresh, charming and full of personality. Lemon cream, wildflower meadows, barley sugar and clean honey sweetness. An underrated gem that consistently over-delivers.",rec:"Excellent entry-level Highland at a great price. Clean, approachable and a reliable recommendation for any palate."},
{n:"Ancnoc 10 Peated",r:"Highlands",a:null,v:46.0,p:9.90,f:["peated","smoky","fruity","floral"],t:"An unusual departure for the distillery — light, friendly peat smoke married with the typical Knockdhu orchard fruitiness. Like a campfire in a flower garden.",rec:"A perfect stepping stone into peated whisky for those who want gentle smoke outside of Islay's intensity."},
{n:"Ancnoc 18 YO",r:"Highlands",a:18,v:46.0,p:20.00,f:["rich","fruity","honeyed","spicy","nutty"],t:"Maturity brings real depth — baked Bramley apple, golden toffee, dark heather honey, dried fruit and building aromatic spice. Extra years add impressive complexity.",rec:"Premium Highland choice for whisky enthusiasts wanting age, complexity and outstanding value."},
{n:"Ardmore 20 YO",r:"Highlands",a:20,v:53.6,p:35.00,f:["peated","smoky","rich","fruity","vanilla"],t:"Ardmore uses peated malt — unusual for the Highlands. Twenty years creates mature, sophisticated smoke, rich vanilla, dried stone fruit and impressive cask strength depth. A Highland rarity.",rec:"Whisky enthusiasts wanting a Highland alternative to Islay peat at remarkable age and strength."},
{n:"Ardmore Legacy",r:"Highlands",a:null,v:40.0,p:7.50,f:["peated","light","smoky","fruity","vanilla"],t:"Entry-level peated Highland — light and friendly peat smoke, orchard fruit, vanilla cream and biscuity malt. Much gentler and more approachable than anything from Islay.",rec:"Customers curious about peat who find Islay too intense. An affordable and gentle introduction to smoky whisky."},
{n:"Balblair 12 YO",r:"Highlands",a:12,v:46.0,p:8.50,f:["fruity","tropical","citrus","light","vanilla"],t:"Balblair is all about vibrancy — tropical mango, bright lime zest, golden syrup and light vanilla on a fresh, lively palate. One of the fruitiest and most energetic Highlands available.",rec:"Customers who gravitate towards fruity, vibrant flavours. Fans of tropical and citrus notes will absolutely love this."},
{n:"Balblair 15 YO",r:"Highlands",a:15,v:46.0,p:13.50,f:["fruity","rich","tropical","citrus","sherried"],t:"Richer and deeper than the 12 — more dried tropical fruit, thick orange marmalade, vanilla cream and a growing sophistication that comes with extra maturity.",rec:"Balblair fans stepping up, or those wanting premium fruity Highland character with real depth."},
{n:"Ben Nevis 10 YO",r:"Highlands",a:10,v:46.0,p:9.00,f:["rich","fruity","spicy","sherried","earthy"],t:"From Fort William at the foot of Britain's highest peak — rustic, earthy and unapologetically old-school. Baked apple, dried fruit, worn leather, aromatic pepper and a character that feels hewn from the mountainside.",rec:"Those who appreciate a less polished, more characterful Highland with genuine rustic charm. A dram with real personality."},
{n:"Clynelish 14 YO",r:"Highlands",a:14,v:46.0,p:11.50,f:["waxy","coastal","citrus","spicy","fruity"],t:"Famous for its extraordinary waxy texture — liquid beeswax, sharp lemon zest, white pepper, sea brine and an almost oily mouthfeel that coats the palate. A beloved classic and key component of Johnnie Walker Gold.",rec:"Whisky enthusiasts who appreciate unusual textures and distinctive styles. Genuinely one of a kind."},
{n:"Cu Bocan Creation",r:"Highlands",a:null,v:46.0,p:8.50,f:["peated","light","fruity","vanilla","smoky"],t:"Tomatin's peated alter ego — lighter, friendlier smoke than anything from Islay, combined with tropical fruit sweetness, vanilla cream and gentle cereal. Approachable and charming.",rec:"Customers wanting Highland peat without Islay intensity. A great conversation starter."},
{n:"Dalmore 12 YO",r:"Highlands",a:12,v:40.0,p:11.50,f:["sherried","rich","citrus","spicy","chocolatey"],t:"Classic Dalmore — American white oak maturation followed by Oloroso sherry finishing creates layers of Christmas cake, blood orange zest, bitter dark chocolate and warm cinnamon spice. Rich, indulgent and undeniably impressive in its distinctive stag-adorned bottle.",rec:"Customers who love rich, sweet, sherry-driven whisky with real presence. Brilliant post-dinner or as an after-hours treat."},
{n:"Dalmore 15 YO",r:"Highlands",a:15,v:40.0,p:18.00,f:["sherried","rich","fruity","spicy","nutty"],t:"More complex and layered than the 12 — richer dried fruit, toasted walnut, espresso, dark orange peel and multiple sherry wood types creating genuine depth.",rec:"Dalmore fans stepping up, or serious whisky lovers wanting deep sherry influence with Highland elegance."},
{n:"Dalmore Alexander III",r:"Highlands",a:null,v:40.0,p:45.00,f:["sherried","rich","fruity","spicy","complex"],t:"Six different cask types including Madeira, Marsala and Cabernet Sauvignon — dark fruit, mocha, bittersweet chocolate, exotic spice and an almost unending complexity. A genuine showstopper.",rec:"Premium occasion drams. For the customer who wants something truly special and is willing to invest in the experience."},
{n:"Dalmore Cigar Malt",r:"Highlands",a:null,v:44.0,p:21.00,f:["rich","sherried","spicy","chocolatey","fruity"],t:"Specifically designed to pair with cigars — dark chocolate, roasted espresso, pipe tobacco and dried fruit that stands up against strong cigar smoke without flinching.",rec:"Cigar enthusiasts, or customers wanting a bold, robust Highland whisky with serious presence."},
{n:"Dalwhinnie 15 YO",r:"Highlands",a:15,v:43.0,p:9.50,f:["honeyed","fruity","floral","light","sweet"],t:"From Scotland's highest distillery at 326 metres — delicate, gentle and impossibly easy to drink. Heather honey, fresh pear, warm oatmeal and a soft floral note like wildflowers in summer rain.",rec:"The classic Highland recommendation for first-timers. If someone says 'I want something light and easy' — start here."},
{n:"Deanston 12 YO",r:"Highlands",a:12,v:46.3,p:8.90,f:["honeyed","nutty","fruity","light","vanilla"],t:"Un-chill filtered from a converted 18th-century cotton mill — nutty cereals, clover honey, vanilla cream and gentle orchard fruit. Authentic artisan charm in every sip.",rec:"Those wanting a natural, honest Highland with gentle sweetness and genuine character at excellent value."},
{n:"Devron 12 YO",r:"Highlands",a:12,v:40.0,p:5.50,f:["light","fruity","floral","vanilla","honeyed"],t:"A lesser-known Highland — light biscuity malt, cream, soft orchard fruit and a clean finish. Budget-friendly and pleasant for everyday drinking.",rec:"Budget option or house pour. Light, uncomplicated and remarkably consistent for the price."},
{n:"Edradour 10 YO",r:"Highlands",a:10,v:40.0,p:9.50,f:["rich","sherried","fruity","nutty","spicy"],t:"From Scotland's smallest traditional distillery — old-fashioned and proud of it. Rich sherry, roasted almond, cream and Christmas spices with genuine handmade character.",rec:"Visitors interested in whisky heritage and the charm of truly small-batch, artisan production."},
{n:"Edradour 12 YO Caledonia",r:"Highlands",a:12,v:46.0,p:10.90,f:["sherried","rich","fruity","spicy","chocolatey"],t:"Exclusively Oloroso sherry matured — significantly deeper than the 10. Dense dark fruit, Christmas pudding, warm spice and candied orange peel. A sherry lover's Highland dream.",rec:"Sherry aficionados wanting small-batch Highland character, or those who loved the 10 and crave more depth."},
{n:"Fettercairn 12 YO",r:"Highlands",a:12,v:40.0,p:7.90,f:["fruity","tropical","citrus","light","honeyed"],t:"Criminally underrated Highland — exotic kiwi, passion fruit, sharp citrus zing and a modern, lively personality. Uses a unique tropical cooling water system that contributes to the distinctive character. Excellent value.",rec:"Customers wanting something fruity, tropical and refreshingly different. One of the best value Highlands on the entire list."},
{n:"Glen Garioch Founders Reserve",r:"Highlands",a:null,v:48.0,p:9.50,f:["fruity","honeyed","spicy","floral","light"],t:"From one of Scotland's oldest distilleries (est. 1797) — meadow flowers, light heather honey, soft fruit and gentle warming spice. Historic and charming.",rec:"Heritage-curious customers wanting an entry-level premium Highland with a genuine story."},
{n:"Glen Garioch 12 YO",r:"Highlands",a:12,v:43.0,p:10.00,f:["fruity","spicy","honeyed","vanilla","earthy"],t:"More developed than the Founders Reserve — baked apple, golden honey, ginger spice and a vanilla warmth. Well-rounded traditional Highland character.",rec:"Those wanting a well-crafted traditional Highland malt with depth and warmth."},
{n:"Glencadam 10 YO",r:"Highlands",a:10,v:46.0,p:7.50,f:["fruity","floral","light","vanilla","citrus"],t:"Ultra-refined and delicate — fresh cream, white peach, light citrus blossom and a whisper of vanilla. Among the most elegant and restrained whiskies on the entire list.",rec:"Beginners, those who find whisky too harsh, or anyone who values finesse over force."},
{n:"Glencadam 18 YO",r:"Highlands",a:18,v:46.0,p:19.50,f:["rich","fruity","vanilla","spicy","honeyed"],t:"Extra years bring real gravitas — ripe stone fruit, warm vanilla, baking spices and a long, elegant finish that rewards slow, contemplative sipping.",rec:"Whisky enthusiasts who appreciate delicacy, finesse and what patience can achieve."},
{n:"GlenDronach 12 YO",r:"Highlands",a:12,v:43.0,p:9.90,f:["sherried","rich","fruity","spicy","chocolatey"],t:"THE sherry specialist of the Highlands — exclusively PX and Oloroso matured for a full-bodied experience of dark plum jam, bitter dark chocolate, candied orange zest, crushed walnut and warm gingerbread spice. Rivals the Macallan in quality at a fraction of the price.",rec:"Anyone who says they love sherry-bomb whisky. This is the one to reach for — exceptional quality and outstanding value."},
{n:"GlenDronach 21 YO",r:"Highlands",a:21,v:48.0,p:36.00,f:["sherried","rich","complex","fruity","nutty"],t:"Twenty-one years in sherry wood create something profound — concentrated dried fig, bitter dark chocolate, roasted espresso, aged leather, antique oak and a finish that unfolds for what feels like an entire evening.",rec:"The crown jewel for sherry whisky devotees. Premium occasions when only the very best sherried malt will do."},
{n:"GlenDronach Ode to the Embers",r:"Highlands",a:null,v:48.4,p:10.00,f:["sherried","smoky","rich","spicy","fruity"],t:"The rare peated GlenDronach — a compelling combination of dark sherry-cask richness and earthy peat smoke. Dried fruit meets smouldering embers in a whisky that shouldn't work but absolutely does.",rec:"For customers who can't decide between smoky and sherried — this delivers both in impressive harmony."},
{n:"GlenDronach Ode to the Valley",r:"Highlands",a:null,v:46.2,p:10.00,f:["sherried","fruity","floral","light","honeyed"],t:"The lighter, more graceful expression in the Ode series — more floral and fruit-forward, with a gentler sherry touch and honeyed freshness. GlenDronach in a summery mood.",rec:"Those wanting GlenDronach's character in a lighter, more approachable and refreshing style."},
{n:"GlenDronach Ode to the Dark",r:"Highlands",a:null,v:50.8,p:11.50,f:["sherried","rich","chocolatey","spicy","complex"],t:"Maximum sherry intensity at full proof — dense, brooding and magnificent. Concentrated espresso, bitter dark chocolate, black treacle and an almost port-like richness. The darkest GlenDronach available.",rec:"Serious sherry whisky devotees wanting maximum intensity and depth. Not for the faint-hearted."},
{n:"GlenDronach Port Wood",r:"Highlands",a:null,v:46.0,p:11.00,f:["sherried","fruity","spicy","rich","floral"],t:"Finished in ruby port pipes — the classic GlenDronach sherry backbone gains fresh red berry sweetness, rose petal and a rosy, wine-influenced character. Elegant and distinctive.",rec:"Sherry fans wanting a fruity, vinous twist. Port wine enthusiasts exploring whisky."},
{n:"Glenglassaugh 12 YO",r:"Highlands",a:12,v:45.0,p:10.00,f:["coastal","fruity","citrus","light","vanilla"],t:"Coastal Highland revived in 2008 — fresh Atlantic sea breeze, bright lemon and lime zest, clean vanilla and light barley malt. Beautifully captures the character of its dramatic Banffshire coastline.",rec:"Those wanting genuine coastal character without any peat smoke. Fresh, bright and endlessly drinkable."},
{n:"Glenglassaugh Revival",r:"Highlands",a:null,v:46.0,p:9.00,f:["coastal","fruity","vanilla","light","honeyed"],t:"Named after the distillery's dramatic return to life — lively, fresh and breezy with stone fruit, sea air, vanilla honey and a clean coastal finish. A distillery reborn.",rec:"Curious customers wanting to try a revived historic distillery with genuine coastal Highland identity."},
{n:"Glengoyne 12 YO",r:"Highlands",a:12,v:43.0,p:9.00,f:["fruity","honeyed","light","nutty","floral"],t:"Unpeated and famously slow-distilled — crisp green apple, golden honey, toasted almond and meadow flowers. Clean, elegant and remarkably pure. Uniquely, it's distilled in the Highlands but matured in the Lowlands.",rec:"Exceptionally clean and approachable Highland. An excellent introduction for beginners who want quality without complexity."},
{n:"Glengoyne 15 YO",r:"Highlands",a:15,v:43.0,p:12.00,f:["fruity","honeyed","sherried","nutty","spicy"],t:"The first hint of sherry influence appears — toffee apple, butterscotch, plump raisin and light cinnamon spice. Beautifully bridges the light 12 and the richer 18.",rec:"Glengoyne fans stepping up. A gateway to sherried whiskies without being dominated by the cask."},
{n:"Glengoyne 18 YO",r:"Highlands",a:18,v:43.0,p:15.00,f:["sherried","rich","fruity","nutty","spicy"],t:"Predominantly sherry-matured — crushed walnut, plump raisin, orange peel, baking spice and golden honeycomb. Outstanding value for an aged, sherry-influenced Highland malt.",rec:"Premium Highland choice at a remarkably fair price. Excellent for fans of slow, traditional distillation."},
{n:"Glengoyne 21 YO",r:"Highlands",a:21,v:43.0,p:22.00,f:["sherried","rich","complex","fruity","chocolatey"],t:"Two decades of careful sherry maturation — intense dried fruit, dark chocolate truffle, espresso, aged leather and old spice. Complex, luxurious and deeply impressive.",rec:"Special occasion Highland. For serious whisky lovers who appreciate what patience and quality casks can achieve."},
{n:"Glengoyne Cask Strength",r:"Highlands",a:null,v:57.2,p:14.00,f:["fruity","sherried","rich","spicy","intense"],t:"Glengoyne's famously clean distillate at full barrel strength — concentrated orchard fruit, intense spice and generous sherry. Batch varies but always exceptional. Add water slowly and watch it transform.",rec:"Enthusiasts wanting Glengoyne at maximum power. Remarkable value for a cask strength single malt."},
{n:"Glenmorangie Original 12 YO",r:"Highlands",a:12,v:40.0,p:9.90,f:["floral","fruity","vanilla","honeyed","light"],t:"The world's best-selling Highland malt — endlessly sippable and impossibly smooth. Orange blossom, ripe peach, vanilla cream and the softest whisper of oak. Matured in the tallest stills in Scotland for maximum elegance.",rec:"The perfect beginner's whisky. When someone says 'I don't really like whisky' — this is where you start. Converts sceptics regularly."},
{n:"Glenmorangie Lasanta",r:"Highlands",a:12,v:43.0,p:9.90,f:["sherried","fruity","honeyed","spicy","vanilla"],t:"The Original given a sherry cask finish — adds plump raisin, orange marmalade, Christmas spice and a warming depth to the classic Glenmorangie elegance.",rec:"Original fans wanting extra richness. An accessible stepping stone to heavier sherried whiskies."},
{n:"Glenmorangie Quinta Ruban",r:"Highlands",a:14,v:46.0,p:11.90,f:["fruity","sherried","rich","spicy","floral"],t:"Finished in ruby port pipes — gorgeous mint chocolate, dark berry fruits and the signature Glenmorangie floral elegance. Fourteen years of maturation adds genuine complexity.",rec:"Port wine enthusiasts exploring whisky. Those wanting fruity richness without going full sherry-bomb."},
{n:"Glenmorangie Nectar D'Or",r:"Highlands",a:12,v:46.0,p:14.50,f:["fruity","honeyed","rich","tropical","spicy"],t:"Finished in Sauternes dessert wine casks — golden, honeyed and exotic. Mango, passion fruit, crème brûlée and a lingering sweetness that recalls the great dessert wines of Bordeaux.",rec:"Wine lovers crossing into whisky. Those who enjoy dessert-style flavours and are seeking something indulgent."},
{n:"Glenmorangie 18 YO",r:"Highlands",a:18,v:43.0,p:20.00,f:["rich","fruity","honeyed","nutty","floral"],t:"Extended American oak maturation at its finest — concentrated vanilla, butterscotch, dried apricot and toasted hazelnut. Glenmorangie at its most confident and accomplished.",rec:"Premium Glenmorangie. Special occasions or customers wanting aged Highland elegance and refinement."},
{n:"Glenmorangie Signet",r:"Highlands",a:null,v:46.0,p:32.00,f:["rich","chocolatey","fruity","spicy","complex"],t:"The masterpiece — uses rare 'chocolate malt' (heavily roasted barley). Rich espresso, 70% dark chocolate, candied orange zest and layers of complex spice. Unlike any other whisky in existence.",rec:"Chocolate and coffee lovers. Whisky connoisseurs wanting something completely unique and unforgettable."},
{n:"Glenmorangie Tale of the Forest",r:"Highlands",a:null,v:46.0,p:11.50,f:["fruity","floral","light","citrus"],t:"Infused with botanicals including juniper, orris root and coriander — fresh, aromatic and almost gin-like in its botanical complexity. A fascinating crossover that blurs spirit categories.",rec:"Gin lovers curious about whisky. Customers wanting something floral, aromatic and genuinely different."},
{n:"Glenturret Triple Wood",r:"Highlands",a:null,v:40.0,p:11.00,f:["sherried","rich","fruity","spicy","honeyed"],t:"Scotland's oldest working distillery (est. 1763) — three cask types create layers of vanilla, sherry sweetness and port-wine richness. Steeped in history.",rec:"History and heritage enthusiasts. Those who appreciate complex, layered flavours with a genuine story."},
{n:"Loch Lomond 12 YO",r:"Highlands",a:12,v:46.0,p:7.50,f:["fruity","light","vanilla","citrus","floral"],t:"Clean and straightforward Highland — lemon citrus, vanilla and soft cereal. Good value, no-nonsense and reliably pleasant.",rec:"Budget-friendly everyday Highland. A solid house pour."},
{n:"Loch Lomond 18 YO",r:"Highlands",a:18,v:46.0,p:16.50,f:["rich","fruity","spicy","vanilla","honeyed"],t:"Extra maturity adds real warmth — dried fruit, toffee, developing spice and vanilla depth. Excellent quality that consistently surprises for the price.",rec:"Good value aged Highland. A solid premium choice that punches above its price."},
{n:"Loch Lomond Single Grain",r:"Highlands",a:null,v:46.0,p:6.90,f:["light","vanilla","fruity","floral","grassy"],t:"Single grain Scotch — lighter, creamier and silkier than malt whisky. Vanilla, coconut, melon and fresh grain. An entirely different whisky experience.",rec:"People new to whisky who find malts too heavy. Those wanting something extremely smooth and gentle."},
{n:"Loch Lomond Inchmurrin 12 YO Peated",r:"Highlands",a:12,v:46.0,p:7.90,f:["peated","light","smoky","fruity","vanilla"],t:"A Highland peated expression — gentler, friendlier smoke than Islay combined with orchard fruit and vanilla sweetness. An accessible, affordable introduction to smoky whisky.",rec:"Customers curious about peat who find Islay intimidating. Excellent value."},
{n:"Loch Lomond Inchmurrin 18 YO",r:"Highlands",a:18,v:46.0,p:16.00,f:["rich","fruity","spicy","vanilla","honeyed"],t:"Unpeated expression — 18 years of maturation adds genuine depth. Ripe fruit, cream, caramel and baking spice. Quietly impressive.",rec:"Good value aged Highland for those wanting maturity without smoke. Reliably impressive."},
{n:"Oban 14 YO",r:"Highlands",a:14,v:43.0,p:11.50,f:["coastal","fruity","spicy","light","waxy"],t:"The gateway to the Isles — a coastal Highland with a wisp of sea mist smoke, dried fruit, orange peel and maritime brine. Beautifully bridges Highland elegance and Island ruggedness.",rec:"Those wanting complexity without committing to heavy peat. A phenomenal all-rounder that satisfies almost everyone."},
{n:"Oban Little Bay",r:"Highlands",a:null,v:43.0,p:8.50,f:["coastal","fruity","light","vanilla","citrus"],t:"Finished in smaller casks — fresh sea air, bright lemon, heather honey and a light coastal breeze. More accessible and lighter than the 14.",rec:"Entry-level Oban, or those wanting a coastal Highland character on a more accessible budget."},
{n:"Old Pulteney 12 YO",r:"Highlands",a:12,v:40.0,p:8.80,f:["coastal","maritime","fruity","nutty","light"],t:"From Wick, the most northerly mainland distillery — properly salty, deeply maritime and utterly distinctive. Dried fruit, sea brine, roasted almond and a coastal freshness that smells of harbours and fishing boats.",rec:"Those wanting a truly maritime coastal experience. Unusual, highly characterful and impossible to confuse with anything else."},
{n:"Old Pulteney 15 YO",r:"Highlands",a:15,v:46.0,p:12.90,f:["coastal","maritime","rich","fruity","nutty"],t:"More developed maritime character — toffee apple, sea air, walnut and gentle sweetness layered over the trademark brine and salt.",rec:"Old Pulteney fans wanting more depth, or coastal enthusiasts seeking a premium step up."},
{n:"Royal Brackla 18 YO",r:"Highlands",a:18,v:40.0,p:10.75,f:["rich","fruity","spicy","sherried","vanilla"],t:"Royal Warrant holder since 1835 — rich tropical fruit, dark spice, vanilla and dried fruit. Seriously underrated and exceptional value for an 18-year-old.",rec:"Those wanting aged royal pedigree at a surprisingly good price. One of the best value aged Highlands available."},
{n:"Royal Lochnagar 12 YO",r:"Highlands",a:12,v:40.0,p:8.90,f:["rich","fruity","spicy","honeyed","light"],t:"Sits next to Balmoral Castle — Queen Victoria's favourite. Dried fruit, light heather honey, vanilla and gentle wood spice. Steeped in royal history.",rec:"Royal history enthusiasts or those wanting a classic, gently complex Highland with a wonderful story."},
{n:"Teaninich 10 YO",r:"Highlands",a:10,v:43.0,p:11.00,f:["grassy","spicy","floral","light","citrus","smoky"],t:"A rare Flora & Fauna bottling — unusual grassy, almost herbal character with meadow herbs, bright citrus zest, white pepper and a distinctly smoky-mineral edge. Rarely seen outside specialist bars and a real discovery for those who find it.",rec:"Whisky enthusiasts wanting something genuinely different from the Highland norm. Remarkable for curious palates."},
{n:"Tomatin 12 YO",r:"Highlands",a:12,v:40.0,p:9.50,f:["fruity","light","vanilla","floral","honeyed"],t:"Clean, light and consistently approachable — vanilla, apple blossom and barley. Reliably pleasant and criminally underrated for the quality delivered.",rec:"Easy everyday Highland. Good value for uncomplicated, honest quality."},
{n:"Tomatin 18 YO",r:"Highlands",a:18,v:46.0,p:20.00,f:["sherried","rich","fruity","spicy","honeyed"],t:"Finished in Oloroso sherry and port casks — dried fruit, toffee, warming spice and the gentle Tomatin barley. Quietly impressive aged Highland.",rec:"Premium Highland for Tomatin fans wanting serious maturity and depth."},
{n:"Tullibardine CC",r:"Highlands",a:null,v:46.0,p:15.00,f:["rich","fruity","spicy","sherried","nutty"],t:"Finished in Château Circé Bordeaux wine casks — adds red berry, vanilla and subtle tannin. Unusual, elegant and distinctly wine-influenced.",rec:"Wine lovers interested in crossover expressions. Fans of fruit-forward richness with a vinous edge."},
{n:"Wolfburn Northland",r:"Highlands",a:null,v:46.0,p:9.00,f:["light","fruity","coastal","vanilla","floral"],t:"From Scotland's most northerly mainland distillery in Thurso — young, fresh and brimming with coastal vitality. Sea breeze, vanilla cream and light orchard fruit.",rec:"Curious customers wanting to try a new distillery with genuine northern coastal identity and spirit."},

/* === SPEYSIDE === */
{n:"Aberlour 12 YO",r:"Speyside",a:12,v:40.0,p:8.50,f:["sherried","fruity","honeyed","vanilla","spicy"],t:"Double cask matured in bourbon and sherry — classic approachable Speyside at its finest. Golden toffee, vanilla, dark cherry and a gentle warming spice. Hard to find fault and even harder to dislike.",rec:"A brilliant all-round Speyside for first-timers wanting a hint of sherry without being overwhelmed. Universally liked."},
{n:"Aberlour 16 YO",r:"Speyside",a:16,v:43.0,p:20.00,f:["sherried","rich","fruity","spicy","chocolatey"],t:"More sherry than the 12 — deeper red fruit, dark chocolate, Christmas cake and building warmth. A proper step up in richness and complexity.",rec:"Aberlour fans stepping up, or sherry enthusiasts wanting a more mature, confident expression."},
{n:"Aberlour A'Bunadh",r:"Speyside",a:null,v:60.2,p:18.00,f:["sherried","rich","fruity","spicy","intense"],t:"Gaelic for 'of the origin' — cask strength, non-chill filtered, exclusively Oloroso matured. A powerful sherry bomb of concentrated sultana, black treacle, dark chocolate and fiery ginger heat. One of the most famous cask strength whiskies in the world.",rec:"Serious sherry whisky devotees and cask strength enthusiasts. Outstanding value for what is arguably the best sherried CS available."},
{n:"Aberlour A'Bunadh Alba",r:"Speyside",a:null,v:62.7,p:17.00,f:["sherried","rich","fruity","spicy","intense"],t:"Higher bourbon proportion alongside sherry — fruitier, brighter and slightly less brooding than the original A'Bunadh. Still full proof and still immense.",rec:"A'Bunadh fans wanting a fruitier take, or those who find the original too heavy on the sherry."},
{n:"Aultmore 12 YO",r:"Speyside",a:12,v:46.0,p:9.60,f:["fruity","floral","light","grassy","vanilla"],t:"A lesser-known Speyside gem — grassy meadows, tropical freshness, soft vanilla and a hint of citrus. Clean, modern and quietly excellent.",rec:"Those wanting a fresh, modern Speyside at great value. A hidden gem worth discovering."},
{n:"Balvenie Doublewood 12 YO",r:"Speyside",a:12,v:40.0,p:9.90,f:["honeyed","vanilla","fruity","spicy","sherried"],t:"The legendary Balvenie — begins life in bourbon casks for vanilla and honey, then finishes in sherry for dried fruit and spice. The definition of perfect balance. A whisky that has converted millions.",rec:"When someone asks for 'a classic Speyside' — this is the benchmark. Suits almost everyone, every time."},
{n:"Balvenie 14 YO Rum Cask",r:"Speyside",a:14,v:43.0,p:12.00,f:["tropical","sweet","vanilla","fruity","spicy"],t:"Finished in Caribbean rum casks — tropical fruit, brown sugar, vanilla and warm spice over Balvenie's classic honey. Sweet, exotic and dangerously drinkable.",rec:"Rum lovers curious about whisky, or anyone wanting something sweet, tropical and indulgent."},
{n:"Balvenie 21 YO",r:"Speyside",a:21,v:40.0,p:65.00,f:["rich","fruity","honeyed","complex","nutty"],t:"Port wood finish — 21 years of maturation then port cask adds berry fruits and remarkable richness. Extraordinary complexity and the Balvenie crown jewel.",rec:"Premium celebration dram. Serious whisky enthusiasts wanting the very finest Speyside has to offer."},
{n:"Benriach Original 10 YO",r:"Speyside",a:10,v:43.0,p:7.50,f:["fruity","vanilla","light","floral","citrus"],t:"Clean, fresh and honestly good — orchard fruit, vanilla, light citrus and cream. Pleasant, unpretentious and remarkably solid for the price.",rec:"Entry-level Speyside or budget recommendation. Genuine quality without the price tag."},
{n:"Benriach 10 YO Peated",r:"Speyside",a:10,v:46.0,p:8.00,f:["peated","smoky","fruity","vanilla","light"],t:"A rare peated Speyside — light smoke wrapped in orchard fruit and vanilla. Unexpected and intriguing. High curiosity value.",rec:"Whisky nerds wanting the unusual combo of Speyside-meets-Islay. Genuinely unique."},
{n:"Benrinnes 15 YO",r:"Speyside",a:15,v:43.0,p:9.50,f:["rich","meaty","fruity","spicy","earthy","citrus"],t:"Flora & Fauna from a distillery that mostly feeds the blending vats. Unusually meaty and robust for Speyside — beef broth, dried fruit, dark spice and a distinctive savoury, almost umami character. A hidden treasure for adventurous palates.",rec:"Whisky enthusiasts wanting something genuinely unusual from Speyside. One of the most distinctive distillery characters in Scotland."},
{n:"Benromach Organic",r:"Speyside",a:null,v:43.0,p:9.50,f:["fruity","light","vanilla","floral","grassy"],t:"Scotland's only certified organic single malt — fresh, clean and vibrant. Citrus blossom, vanilla and light cereal with a clear conscience.",rec:"Those interested in provenance, sustainability and organic production."},
{n:"Benromach Peat Smoke",r:"Speyside",a:null,v:46.0,p:9.00,f:["peated","smoky","fruity","vanilla","light"],t:"Benromach uses lightly peated malt — gentle campfire smoke, apple and pear, honey and a soft coastal edge. Approachable and charming.",rec:"Peat-curious customers wanting something far gentler than Islay."},
{n:"Benromach 12 Triple Distilled",r:"Speyside",a:12,v:46.0,p:9.50,f:["light","fruity","floral","vanilla","honeyed"],t:"Triple distillation creates particularly smooth and pure spirit — soft orchard fruit, cream, floral notes and delicate vanilla. Silky smooth.",rec:"Those wanting a very smooth, refined Speyside. Excellent for sensitive palates."},
{n:"Cragganmore 12 YO",r:"Speyside",a:12,v:40.0,p:8.90,f:["fruity","floral","grassy","spicy","light"],t:"Classic Diageo Flora & Fauna — complex floral and herbal. Dried meadow herbs, citrus blossom, cut grass and gentle spice. Quiet complexity that reveals itself over time.",rec:"Those interested in classic Speyside character and subtle, layered complexity."},
{n:"Cragganmore Distillers Edition",r:"Speyside",a:null,v:40.0,p:11.50,f:["sherried","fruity","floral","spicy","rich"],t:"The Classic 12 finished in port pipes — berry richness and port-wine sweetness layered over the floral Cragganmore character. Lovely balance.",rec:"Cragganmore fans wanting extra depth, or port wine enthusiasts exploring whisky."},
{n:"Craigellachie 13 YO",r:"Speyside",a:13,v:46.0,p:11.00,f:["meaty","fruity","spicy","earthy","rich"],t:"Famous for its distinctive sulphur character from worm tub condensers — meaty, brothy, smoked ham, dried fruit and a polarising but passionately beloved personality. One of the most unusual Speysides made.",rec:"Whisky nerds and flavour adventurers. If someone says 'give me something genuinely different and interesting' — this is the answer."},
{n:"Craigellachie 17 YO",r:"Speyside",a:17,v:46.0,p:18.00,f:["meaty","rich","fruity","spicy","complex"],t:"The sulphur mellows with age into something magnificent — leather, dried tropical fruit, smoked bacon, building spice and real complexity.",rec:"Serious enthusiasts who already know and appreciate Craigellachie's unique character."},
{n:"Glen Elgin 12 YO",r:"Speyside",a:12,v:43.0,p:7.90,f:["fruity","floral","honeyed","light","vanilla"],t:"A Flora & Fauna gem — floral, honeyed and wonderfully gentle. Often called one of the most underrated Speysides in existence. Quiet quality.",rec:"Value recommendation or those wanting classic floral Speyside character at a bargain price."},
{n:"Glen Spey 12 YO",r:"Speyside",a:12,v:43.0,p:7.90,f:["fruity","floral","light","grassy","vanilla"],t:"Another F&F treasure — dry, floral and grassy with green apple, cream and gentle spice. Honest and pleasant.",rec:"Budget-conscious customers wanting reliable quality Speyside without pretension."},
{n:"Glenallachie 12 YO",r:"Speyside",a:12,v:46.0,p:8.50,f:["sherried","fruity","rich","spicy","honeyed"],t:"Billy Walker's distillery (the legend behind GlenDronach) — rich sherry, ripe plum, raisin, milk chocolate and warming spice. Exceptional value that consistently surprises above its price point.",rec:"Sherry lovers on a budget. Frequently described as the best value sherried Speyside available today."},
{n:"Glenfarclas 10 YO",r:"Speyside",a:10,v:40.0,p:8.90,f:["sherried","fruity","honeyed","spicy","vanilla"],t:"Family-owned for six generations, 100% sherry casked — golden toffee, light raisin, fresh orange and vanilla spice. The most accessible entry point to the legendary Glenfarclas range.",rec:"Entry-level sherried Speyside. Great for understanding what sherry cask influence can do to whisky."},
{n:"Glenfarclas 15 YO",r:"Speyside",a:15,v:46.0,p:13.00,f:["sherried","rich","fruity","spicy","chocolatey"],t:"A significant step up — darker, richer sherry character with dark chocolate, dried fig, warm Christmas spices and a long, satisfying finish. Rivals the Macallan at half the price.",rec:"Sherry whisky fans wanting genuine depth and complexity at outstanding value."},
{n:"Glenfarclas 25 YO",r:"Speyside",a:25,v:43.0,p:60.00,f:["sherried","rich","complex","fruity","nutty"],t:"A quarter century of Oloroso sherry maturation — extraordinary depth. Antique furniture, rancio, Christmas cake, roasted hazelnut and a finish that simply never ends.",rec:"Premium celebration. Serious sherry enthusiasts wanting the full Glenfarclas experience at its most profound."},
{n:"Glenfarclas 105 Cask Strength",r:"Speyside",a:null,v:60.0,p:12.50,f:["sherried","rich","intense","spicy","fruity"],t:"105 degrees proof (old UK measure) — a massive, unfiltered sherry bomb at full strength. Concentrated raisin, dark spice, leather and Oloroso intensity that demands a drop of water and rewards with hours of evolving flavour.",rec:"Cask strength and sherry enthusiasts. One of the best value full-proof whiskies available anywhere in the world."},
{n:"Glenfiddich 12 YO",r:"Speyside",a:12,v:40.0,p:7.90,f:["fruity","floral","vanilla","light"],t:"The world's best-selling single malt — and for excellent reason. Fresh pear drops, vanilla cream, a hint of toasted oak and a clean, approachable finish. Light, friendly and the gateway Scotch whisky for millions of drinkers worldwide.",rec:"Absolute beginners. Those who 'don't usually drink whisky'. A universal crowd-pleaser that never disappoints."},
{n:"Glenfiddich 15 YO",r:"Speyside",a:15,v:40.0,p:11.50,f:["sherried","fruity","rich","spicy","vanilla"],t:"Solera system matured — the famous vat is never emptied below halfway, ensuring continuity and complexity. Sherry, honey, cream and mellow spice.",rec:"Those who enjoyed the 12 and want something richer and more complex. The logical next step."},
{n:"Glenfiddich 18 YO",r:"Speyside",a:18,v:40.0,p:18.00,f:["sherried","rich","fruity","nutty","spicy"],t:"Oloroso sherry cask finish — dried fruit, dark chocolate, walnut and a long warming finish. Glenfiddich getting properly serious.",rec:"Premium Glenfiddich for special occasions or experienced drinkers wanting aged Speyside elegance."},
{n:"Glenfiddich 26 YO Grande Couronne",r:"Speyside",a:26,v:43.0,p:72.00,f:["rich","fruity","complex","vanilla","sherried"],t:"Finished in French Cognac casks — aged Scotch meets Cognac wood. Dark fruit, exotic spice, dried apricot and sophisticated French oak elegance.",rec:"Premium celebration. A unique Cognac-Speyside experience for collectors and connoisseurs."},
{n:"Glenfiddich XX",r:"Speyside",a:null,v:40.0,p:10.50,f:["sweet","vanilla","fruity","spicy","light"],t:"Blended from 20 distinct cask styles within the Glenfiddich warehouse — layers of vanilla, orchard fruit, spice and oak. A creative experiment.",rec:"Glenfiddich fans wanting something different. Layered complexity at approachable ABV."},
{n:"Glenfiddich Fire & Cane",r:"Speyside",a:null,v:43.3,p:9.90,f:["peated","smoky","sweet","tropical","vanilla"],t:"A peated Glenfiddich finished in rum casks — campfire smoke, Caribbean rum sweetness, tropical fruit and vanilla. A genuinely exciting flavour journey.",rec:"Those wanting to explore peat outside Islay, or rum lovers curious about smoky whisky."},
{n:"Glenfiddich Orchard Experiment",r:"Speyside",a:null,v:43.0,p:7.90,f:["fruity","tropical","light","floral","citrus"],t:"Inspired by French apple brandy casks — fresh orchard fruit, apple blossom, pear and citrus. Light, aromatic and refreshingly different.",rec:"Those wanting something light and fruity. Calvados, cider or fruit brandy drinkers."},
{n:"Glenlivet 12 YO",r:"Speyside",a:12,v:40.0,p:8.50,f:["fruity","floral","vanilla","light","citrus"],t:"The original single malt — established in 1824. Light, fragrant and endlessly approachable. Tropical fruit, vanilla cream and a delicate floral finish. A cornerstone of Scotch whisky.",rec:"Classic beginner Speyside. A safe, reliable recommendation for anyone wanting to try Scotch malt whisky."},
{n:"Glenlivet 15 YO French Oak",r:"Speyside",a:15,v:40.0,p:11.00,f:["fruity","floral","rich","vanilla","sherried"],t:"Finished in French Limousin oak — adds a wine-like sophistication, richer fruit and rounded vanilla warmth.",rec:"Those who enjoyed the 12 and want more complexity. Wine drinkers exploring whisky."},
{n:"Glenlivet 18 YO",r:"Speyside",a:18,v:43.0,p:16.00,f:["rich","fruity","vanilla","spicy","honeyed"],t:"Three cask types create a mature, complex and elegant experience — dried apricot, vanilla oak, gentle spice and a long, clean finish.",rec:"Premium Glenlivet. Aged elegance in a classic Speyside style."},
{n:"Glenlivet Founders Reserve",r:"Speyside",a:null,v:40.0,p:7.90,f:["fruity","vanilla","light","floral","citrus"],t:"Entry-level using larger American oak casks — soft, creamy vanilla, citrus and light fruit. Easy and pleasant.",rec:"Beginner's whisky or house pour. Light, easy and crowd-pleasing."},
{n:"Linkwood 12 YO",r:"Speyside",a:12,v:43.0,p:10.00,f:["floral","fruity","light","grassy","vanilla"],t:"A Diageo F&F gem — delicate, floral and feminine. Rose petal, fresh grass, melon and a soft vanilla finish. Quietly beautiful.",rec:"Those wanting something uniquely delicate. Whisky collectors and enthusiasts."},
{n:"Linkwood 15 YO G&M",r:"Speyside",a:15,v:46.0,p:11.90,f:["floral","fruity","rich","vanilla","spicy"],t:"Gordon & MacPhail bottling — the delicate Linkwood character deepened with richer vanilla and building spice.",rec:"Whisky enthusiasts wanting a more developed version of this rare Speyside."},
{n:"Macallan 12 YO Double Cask",r:"Speyside",a:12,v:40.0,p:12.90,f:["sherried","fruity","vanilla","honeyed","spicy"],t:"Mix of American and European oak sherry casks — balanced, approachable and reliably excellent. Honey, citrus, dried fruit and warm spice. The famous name delivers.",rec:"Those wanting a renowned name with genuine sherried character. A reliable crowd-pleaser."},
{n:"Macallan 12 YO Triple Cask",r:"Speyside",a:12,v:43.0,p:13.50,f:["sherried","fruity","vanilla","honeyed","spicy"],t:"Three cask types — slightly richer than the Double Cask with more vanilla and a touch more wood spice.",rec:"Macallan fans comparing cask types. An excellent gift bottle."},
{n:"Macallan 15 YO Double Cask",r:"Speyside",a:15,v:43.0,p:22.50,f:["sherried","rich","fruity","spicy","chocolatey"],t:"Deeper sherry, dried fruit, dark chocolate, ginger and a longer finish. A proper step up in complexity and richness.",rec:"Macallan fans stepping up, or those wanting premium sherried Speyside."},
{n:"Macallan 18 YO Sherry",r:"Speyside",a:18,v:43.0,p:54.50,f:["sherried","rich","complex","fruity","spicy"],t:"Exclusively European oak sherry casks — eighteen years of extraordinary richness. Dark chocolate, leather, dried plum, Christmas spice and a finish that lasts for minutes. Iconic.",rec:"Premium celebration or very special occasion. Serious sherry lovers investing in excellence."},
{n:"Macallan 18 YO Triple Wood",r:"Speyside",a:18,v:43.0,p:65.00,f:["sherried","rich","vanilla","fruity","complex"],t:"Three sherry cask types for 18 years — more nuanced than the single sherry 18. Vanilla, dark fruit, candied orange and a very long, sophisticated finish.",rec:"The ultimate premium recommendation. For customers who want the very best available."},
{n:"Macallan Night On Earth",r:"Speyside",a:null,v:43.0,p:22.00,f:["fruity","tropical","sherried","spicy","rich"],t:"Five casks representing five time zones — tropical fruit, ginger, dried fruit and spice. Complex, creative and collectible.",rec:"Macallan collectors and adventurous fans wanting something beyond the core range."},
{n:"Mannochmore 12 YO",r:"Speyside",a:12,v:43.0,p:10.00,f:["floral","fruity","light","grassy","vanilla"],t:"Flora & Fauna from an industrial Diageo distillery rarely seen independently. Floral, light, lemony and clean.",rec:"Whisky nerds who want to explore 'hidden' Diageo distilleries."},
{n:"Milton Duff 10 YO",r:"Speyside",a:10,v:40.0,p:7.50,f:["light","fruity","floral","vanilla","grassy"],t:"Rarely seen independent bottling — light, fresh, floral and grassy. Barley, vanilla and gentle fruit.",rec:"Budget-friendly Speyside or curious explorers."},
{n:"Mortlach 12 YO Wee Witchie",r:"Speyside",a:12,v:43.4,p:11.00,f:["meaty","rich","spicy","fruity","earthy"],t:"Named after the unique partial triple distillation that makes Mortlach unlike any other — the 'Beast of Dufftown'. Rich, meaty, almost steak-like with dark fruit and heavy spice. One of whisky's most distinctive characters.",rec:"Whisky enthusiasts wanting genuinely unusual Speyside character. If they want something no other distillery can replicate — this is it."},
{n:"Singleton of Dufftown 12 YO",r:"Speyside",a:12,v:40.0,p:9.50,f:["fruity","honeyed","light","vanilla","floral"],t:"Diageo's accessible Speyside — designed to be approachable and sweet. Toffee apple, cream, light fruit and vanilla.",rec:"Beginners wanting an easy, pleasant introduction. Safe and well-known."},
{n:"Tamnavulin Double Cask",r:"Speyside",a:null,v:40.0,p:6.50,f:["fruity","light","vanilla","floral","honeyed"],t:"Speyside's budget champion — surprisingly approachable and pleasant. Light fruit, vanilla and a clean finish. Honest value.",rec:"Budget recommendation. Great house pour. Consistent and reliable."},
{n:"Tamdhu 12 YO",r:"Speyside",a:12,v:43.0,p:8.90,f:["sherried","fruity","honeyed","spicy","vanilla"],t:"Exclusively Oloroso sherry casks — rich dark fruit, toffee, orange chocolate and warm spice. Exceptional value for a fully sherried single malt.",rec:"Sherry lovers on a budget. Rivals bottles costing twice as much."},
{n:"Tamdhu 15 YO",r:"Speyside",a:15,v:46.0,p:17.00,f:["sherried","rich","fruity","spicy","chocolatey"],t:"15 years of Oloroso maturation — concentrated dark fruit, espresso, dark chocolate and layers of building spice.",rec:"Premium sherry whisky. Serious quality at a remarkably fair price."},
{n:"Tamdhu Cask Strength",r:"Speyside",a:null,v:57.8,p:12.00,f:["sherried","rich","intense","spicy","fruity"],t:"Full proof Oloroso sherry — concentrated treacle, plump raisin, fiery ginger and dark chocolate heat. Add water carefully.",rec:"Cask strength and sherry fans. One of the best value CS sherry whiskies anywhere."},
{n:"Tamdhu Quercus Alba",r:"Speyside",a:null,v:48.0,p:11.00,f:["vanilla","fruity","light","sherried","spicy"],t:"American white oak finish following sherry maturation — adds vanilla, coconut and tropical fruit over the sherried base.",rec:"Those who want Tamdhu's sherry character with added vanilla sweetness."},
{n:"Tomintoul 10 YO",r:"Speyside",a:10,v:40.0,p:7.50,f:["light","fruity","floral","vanilla","grassy"],t:"From the Glenlivet valley — called 'the gentle dram'. Vanilla, cream and soft cereal. Very easy drinking.",rec:"Beginners wanting the lightest and most approachable Speyside experience."},
{n:"Auchroisk 10 YO",r:"Speyside",a:10,v:43.0,p:9.60,f:["fruity","floral","vanilla","light","citrus"],t:"F&F bottling from a Diageo distillery — clean, fresh and underrated. Orchard fruit, vanilla cream and floral freshness.",rec:"Whisky explorers hunting hidden gems."},
{n:"Speyburn 10 YO",r:"Speyside",a:10,v:40.0,p:7.80,f:["fruity","light","grassy","floral","vanilla"],t:"Speyside's accessible everyday dram — fresh grass, orchard fruit, vanilla and clean barley.",rec:"Best value Speyside. Outstanding house pour or budget recommendation."},
{n:"Tormore 12 YO",r:"Speyside",a:12,v:40.0,p:null,f:["sweet","vanilla","honeyed","fruity","nutty","light"],t:"From Scotland's most architecturally stunning distillery, built in 1958 with its famous musical clock and topiary gardens. Soft honeyed vanilla, ripe plum, toasted marzipan, cereal biscuit and a gentle nutty finish. A deliberately sweet and charming spirit that showcases the lighter, more elegant side of Speyside.",rec:"Customers seeking a sweet, gentle and honeyed dram. Ideal after dinner or for those who appreciate the lighter, more delicate end of Scotch whisky. A brilliant hidden gem."},

/* === LOWLAND === */
{n:"Auchentoshan 3 Wood",r:"Lowland",a:null,v:43.0,p:9.00,f:["sherried","rich","fruity","spicy","vanilla"],t:"Triple distilled then matured in three cask types — bourbon, Oloroso and PX. Rich, sweet and surprisingly complex for a Lowland. Proves this region can do more than light and delicate.",rec:"Those wanting Lowland smoothness with extra richness and complexity."},
{n:"Auchentoshan American Oak",r:"Lowland",a:null,v:40.0,p:7.50,f:["light","vanilla","fruity","floral","citrus"],t:"The signature Auchentoshan — triple distilled for exceptional smoothness. Lemon, vanilla cream and spring blossom. Almost gin-like in its freshness and purity. Lighter than any other Scotch whisky.",rec:"Gin lovers transitioning to whisky. Beginners who want the gentlest entry point possible."},
{n:"Bladnoch Samsara",r:"Lowland",a:null,v:46.7,p:12.70,f:["fruity","tropical","floral","vanilla","light"],t:"From Scotland's most southerly distillery — finished in Californian Cabernet Sauvignon casks. Lychee, tropical fruit, vanilla and wine-influenced sweetness. Unusual and elegant.",rec:"Wine lovers. Those wanting fruity and unusual Lowland character."},
{n:"Borders",r:"Lowland",a:null,v:40.0,p:8.50,f:["light","grassy","fruity","floral","vanilla"],t:"From the new (2018) Borders Distillery in Hawick — fresh, clean and light. Green grass, citrus, cereal and vanilla.",rec:"Those curious about new Scottish distilleries or wanting the lightest possible whisky."},
{n:"Glenkinchie 12 YO",r:"Lowland",a:12,v:43.0,p:9.00,f:["light","grassy","floral","vanilla","citrus"],t:"Diageo's signature Lowland — dry, fresh and grassy. Cut grass, lemon peel, vanilla and a clean finish. The classic Edinburgh malt and the Lowland benchmark.",rec:"Edinburgh tourism angle — 'the capital's local malt'. Light, very easy drinking and a perfect introduction to Lowland character."},

];

const REGIONS=["All","Islay","Highlands","Speyside","Lowland","Islands","Campbeltown","Japanese","Welsh","Blend"];
const FLAVOURS=["peated","smoky","sherried","fruity","honeyed","spicy","coastal","floral","vanilla","rich","light","tropical","nutty","maritime","citrus","chocolatey","complex","intense","sweet","meaty","waxy","grassy","salty","earthy"];

function App(){
  const [q,setQ]=React.useState("");
  const [rf,setRf]=React.useState("All");
  const [ff,setFf]=React.useState([]);
  const [ex,setEx]=React.useState(null);
  const [sb,setSb]=React.useState("name");
  const [lang,setLang]=React.useState("en");
  const [langOpen,setLangOpen]=React.useState(false);
  const [recOpen,setRecOpen]=React.useState(false);
  const T=TRANSLATIONS[lang];
  const tog=f=>{setFf(p=>{const nf=p.includes(f)?p.filter(x=>x!==f):[...p,f];if(nf.length>0)setSb("relevance");else if(rf==="All")setSb("name");return nf;});};

  /* Relevance scoring */
  const getRelevanceScore=(w)=>{
    let score=1000;
    /* If region filter active, use region relevance */
    if(rf!=="All" && REGION_RELEVANCE[rf]){
      const idx=REGION_RELEVANCE[rf].indexOf(w.n);
      if(idx!==-1) score-=idx*2;
      else score-=500;
    }
    /* If flavour filters active, use flavour relevance */
    if(ff.length>0){
      ff.forEach(f=>{
        if(RELEVANCE_RANKS[f]){
          const idx=RELEVANCE_RANKS[f].indexOf(w.n);
          if(idx!==-1) score-=idx;
          else if(w.f.includes(f)) score-=50;
          else score-=200;
        }
      });
    }
    /* If search query active, boost matches in name/tasting/rec */
    if(q.trim()){
      const s=q.toLowerCase();
      /* Check if search matches a flavour key for relevance */
      if(RELEVANCE_RANKS[s]){
        const idx=RELEVANCE_RANKS[s].indexOf(w.n);
        if(idx!==-1) score += (100-idx);
        else if(w.f.includes(s)) score-=50;
      }
      if(w.n.toLowerCase().includes(s)) score+=50;
      if(w.f.some(f=>f.includes(s))) score+=30;
    }
    /* Price factor: slightly boost better value (lower price) */
    if(w.p) score += Math.max(0, 20 - w.p*0.3);
    /* Bartender choice boost */
    const isBC=Object.values(BARTENDER_CHOICES).includes(w.n);
    if(isBC) score+=15;
    return score;
  };

  const list=React.useMemo(()=>{
    let l=WL;
    if(rf!=="All")l=l.filter(w=>w.r===rf);
    if(ff.length)l=l.filter(w=>ff.every(f=>w.f.includes(f)));
    if(q.trim()){const s=q.toLowerCase();l=l.filter(w=>w.n.toLowerCase().includes(s)||w.t.toLowerCase().includes(s)||w.rec.toLowerCase().includes(s)||w.r.toLowerCase().includes(s)||w.f.some(f=>f.includes(s))||(w.ib&&w.ib.toLowerCase().includes(s)));}
    if(sb==="relevance")l=[...l].sort((a,b)=>getRelevanceScore(b)-getRelevanceScore(a));
    else if(sb==="name")l=[...l].sort((a,b)=>a.n.localeCompare(b.n));
    else if(sb==="price")l=[...l].sort((a,b)=>(a.p||999)-(b.p||999));
    else if(sb==="age")l=[...l].sort((a,b)=>(a.a||0)-(b.a||0));
    else if(sb==="abv")l=[...l].sort((a,b)=>(b.v||0)-(a.v||0));
    return l;
  },[q,rf,ff,sb,lang]);

  const cnt=React.useMemo(()=>{const c={};WL.forEach(w=>{c[w.r]=(c[w.r]||0)+1;});return c;},[]);
  const S={fontFamily:"Georgia,'Times New Roman',serif",background:"#0d0a06",minHeight:"100vh",color:"#e8d5b0"};

  const isActive=rf!=="All"||ff.length>0||q.trim();
  const activeBCNames=React.useMemo(()=>{
    const names=new Set();
    if(rf!=="All" && BARTENDER_CHOICES[rf]) names.add(BARTENDER_CHOICES[rf]);
    ff.forEach(f=>{if(BARTENDER_CHOICES[f]) names.add(BARTENDER_CHOICES[f]);});
    return names;
  },[rf,ff]);

  const LANG_FLAGS={en:"🇬🇧",es:"🇪🇸",it:"🇮🇹",zh:"🇨🇳"};
  const LANG_NAMES={en:"English",es:"Español",it:"Italiano",zh:"中文"};

  return(
    <div style={S}>
      <div style={{background:"linear-gradient(135deg,#1a0e00 0%,#2d1a00 50%,#1a0e00 100%)",borderBottom:"2px solid #8b6914",padding:"12px 16px 10px",textAlign:"center",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(0,0,0,0.8)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:2}}>
          <img src={LOGO_SRC} alt="Whiski Bar & Restaurant" style={{height:50,width:"auto",filter:"brightness(1.1)"}}/>
          <div>
            <h1 style={{margin:0,fontSize:"clamp(0.85rem,3vw,1.3rem)",color:"#d4a017",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:"bold"}}>{T.subtitle}</h1>
            <p style={{margin:0,fontSize:"0.65rem",color:"#a0875a",letterSpacing:"0.12em",textTransform:"uppercase"}}>{WL.length} expressions</p>
          </div>
        </div>
      </div>
      <div style={{maxWidth:900,margin:"0 auto",padding:"14px 12px"}}>
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <input value={q} onChange={e=>{setQ(e.target.value);if(e.target.value.trim())setSb("relevance");else if(rf==="All"&&ff.length===0)setSb("name");}} placeholder={T.searchPlaceholder} style={{flex:1,minWidth:180,background:"#1a1008",border:"1px solid #5a4020",borderRadius:8,color:"#e8d5b0",padding:"9px 14px",fontSize:"0.84rem",outline:"none"}}/>
          <select value={sb} onChange={e=>setSb(e.target.value)} style={{background:"#1a1008",border:"1px solid #5a4020",borderRadius:8,color:"#d4a017",padding:"9px 12px",fontSize:"0.78rem",cursor:"pointer"}}>
            <option value="relevance">{T.sortRelevance}</option>
            <option value="name">{T.sortAZ}</option>
            <option value="price">{T.sortPrice}</option>
            <option value="age">{T.sortAge}</option>
            <option value="abv">{T.sortABV}</option>
          </select>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {REGIONS.map(r=>{const c=RC[r]||{ac:"#888",ba:"#333"};const act=rf===r;return(
            <button key={r} onClick={()=>{setRf(r);setSb(r==="All"&&ff.length===0?"name":"relevance");}} style={{background:act?c.ba:"#1a1008",border:`1px solid ${act?c.ac:"#3a2810"}`,borderRadius:20,color:act?c.ac:"#a0875a",padding:"4px 11px",fontSize:"0.68rem",cursor:"pointer",fontFamily:"inherit"}}>
              {r==="All"?`${T.allRegion} (${WL.length})`:`${r} (${cnt[r]||0})`}
            </button>
          );})}
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
          {FLAVOURS.map(f=>{const act=ff.includes(f);return(
            <button key={f} onClick={()=>tog(f)} style={{background:act?"#3a2800":"#110c04",border:`1px solid ${act?"#d4a017":"#2a1e08"}`,borderRadius:20,color:act?"#d4a017":"#6a5030",padding:"2px 9px",fontSize:"0.65rem",cursor:"pointer",fontFamily:"inherit"}}>
              {(FI[f]||"")} {f}
            </button>
          );})}
          {ff.length>0&&<button onClick={()=>setFf([])} style={{background:"#2a0808",border:"1px solid #8b3030",borderRadius:20,color:"#c06060",padding:"2px 9px",fontSize:"0.65rem",cursor:"pointer",fontFamily:"inherit"}}>✕ {T.clear}</button>}
        </div>
        <div style={{marginBottom:12}}>
          <button onClick={()=>setRecOpen(!recOpen)} style={{width:"100%",padding:"10px 14px",background:recOpen?"#110c04":"linear-gradient(135deg,#1a1008,#110c04)",border:"1px solid #2a1e08",borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"inherit"}}>
            <span style={{fontSize:"0.72rem",color:"#d4a017",letterSpacing:"0.1em",fontWeight:"bold"}}>{T.quickRec}</span>
            <span style={{color:"#d4a017",fontSize:"0.7rem",transition:"transform 0.2s",transform:recOpen?"rotate(180deg)":"rotate(0deg)"}}>▼</span>
          </button>
          {recOpen&&(
            <div style={{padding:"10px 14px",background:"#110c04",border:"1px solid #2a1e08",borderTop:"none",borderRadius:"0 0 10px 10px",marginTop:-1}}>
              {[[T.smokiest,"Ardbeg 10, Lagavulin 16, Laphroaig 10"],[T.bestSherry,"GlenDronach 12, Aberlour A'Bunadh, Glenfarclas 105"],[T.bestBeginner,"Glenmorangie Original, Glenfiddich 12, Dalwhinnie 15"],[T.coastalMaritime,"Talisker 10, Oban 14, Old Pulteney 12"],[T.bestValue,"Nikka From The Barrel, Tamdhu 12, Glenfarclas 105"],[T.premiumCelebration,"Highland Park 18, Macallan 18 Sherry, GlenDronach 21"],[T.japanese,"Nikka From The Barrel, Hibiki Harmony, Yamazaki 12"],[T.fruityTropical,"Balblair 12, Glenmorangie Nectar D'Or, Arran 10"]].map(([cat,recs])=>(
                <div key={cat} style={{marginBottom:5,display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:"0.68rem",color:"#a0875a",minWidth:150,flexShrink:0}}>{cat}</span>
                  <span style={{fontSize:"0.66rem",color:"#6a5030"}}>{recs}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <p style={{fontSize:"0.68rem",color:"#6a5030",marginBottom:8,letterSpacing:"0.1em"}}>{T.showing} {list.length} {T.of} {WL.length} {T.expressions}</p>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {list.map(w=>{
            const c=RC[w.r]||{bg:"#1a1008",ac:"#888",ba:"#2a2010"};
            const open=ex===w.n;
            const isBC=activeBCNames.has(w.n);
            return(
              <div key={w.n} onClick={()=>setEx(open?null:w.n)} style={{background:open?c.bg:"#110c04",border:`1px solid ${isBC?"#d4a017":open?c.ac:"#2a1e08"}`,borderRadius:10,cursor:"pointer",overflow:"hidden",position:"relative"}}>
                {isBC&&<div style={{position:"absolute",top:0,right:0,background:"linear-gradient(135deg,#d4a017,#8b6914)",color:"#0d0a06",fontSize:"0.55rem",fontWeight:"bold",padding:"2px 8px 2px 12px",borderRadius:"0 9px 0 8px",letterSpacing:"0.05em",zIndex:1}}>{T.bartenderChoice}</div>}
                <div style={{display:"flex",alignItems:"center",padding:"9px 13px",gap:9}}>
                  <span style={{background:c.ba,color:c.ac,borderRadius:6,padding:"2px 6px",fontSize:"0.6rem",fontWeight:"bold",letterSpacing:"0.08em",minWidth:22,textAlign:"center",flexShrink:0}}>{RA[w.r]||w.r.slice(0,2)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"0.86rem",color:open?c.ac:"#e8d5b0",fontWeight:"bold",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{w.n}</div>
                    <div style={{display:"flex",gap:7,marginTop:2,flexWrap:"wrap"}}>
                      {w.a&&<span style={{fontSize:"0.61rem",color:"#8a7050"}}>{w.a}{T.yr}</span>}
                      {w.v&&<span style={{fontSize:"0.61rem",color:"#8a7050"}}>{w.v}%</span>}
                      {w.p&&<span style={{fontSize:"0.61rem",color:"#a0875a",fontWeight:"bold"}}>£{w.p.toFixed(2)}</span>}
                      {!w.p&&<span style={{fontSize:"0.61rem",color:"#5a4020",fontStyle:"italic"}}>Ask</span>}
                      {w.ib&&<span style={{fontSize:"0.55rem",color:"#9b7bd4",background:"#2a1a3a",padding:"0px 5px",borderRadius:6}}>{T.indieBottler}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:3,flexWrap:"wrap",maxWidth:120,justifyContent:"flex-end"}}>
                    {w.f.slice(0,3).map(f=><span key={f} style={{fontSize:"0.57rem",background:"#1a1008",border:"1px solid #3a2810",borderRadius:10,padding:"1px 5px",color:"#8a7050"}}>{f}</span>)}
                  </div>
                  <span style={{color:c.ac,fontSize:"0.72rem",flexShrink:0,marginLeft:3}}>{open?"▲":"▼"}</span>
                </div>
                {open&&(
                  <div style={{padding:"0 13px 13px",borderTop:`1px solid ${c.ba}`}}>
                    <div style={{marginTop:10,marginBottom:9}}>
                      <div style={{fontSize:"0.66rem",color:c.ac,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>{T.tastingNotes}</div>
                      <p style={{margin:0,fontSize:"0.81rem",color:"#d4c09a",lineHeight:1.6}}>{w.t}</p>
                    </div>
                    <div style={{background:"#0a0800",borderLeft:`3px solid ${c.ac}`,padding:"7px 11px",borderRadius:"0 6px 6px 0"}}>
                      <div style={{fontSize:"0.66rem",color:c.ac,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>{T.recommendWhen}</div>
                      <p style={{margin:0,fontSize:"0.79rem",color:"#b0956a",lineHeight:1.5}}>{w.rec}</p>
                    </div>
                    {w.ib&&(
                      <div style={{marginTop:7,padding:"5px 9px",background:"#1a1030",border:"1px solid #3a2550",borderRadius:6}}>
                        <span style={{fontSize:"0.65rem",color:"#9b7bd4"}}>🏷️ {w.ib}</span>
                      </div>
                    )}
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:9}}>
                      {w.f.map(f=><span key={f} style={{fontSize:"0.61rem",background:c.ba,border:`1px solid ${c.ac}40`,borderRadius:12,padding:"2px 7px",color:c.ac}}>{(FI[f]||"")} {f}</span>)}
                    </div>
                    <div style={{marginTop:7,fontSize:"0.66rem",color:"#5a4020"}}>{w.r} · {w.a?w.a+" "+T.yrs:T.nas} · {w.v?w.v+"% ABV":"ABV varies"}{w.ib?` · ${w.ib}`:""}</div>
                  </div>
                )}
              </div>
            );
          })}
          {list.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#5a4020"}}><div style={{fontSize:"2rem",marginBottom:8}}>🥃</div><p>{T.noMatch}</p></div>}
        </div>
      </div>

      {/* Language selector - bottom right */}
      <div style={{position:"fixed",bottom:16,right:16,zIndex:200}}>
        {langOpen&&(
          <div style={{background:"#1a1008",border:"1px solid #8b6914",borderRadius:10,marginBottom:8,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.6)"}}>
            {Object.keys(TRANSLATIONS).map(code=>(
              <button key={code} onClick={()=>{setLang(code);setLangOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 16px",background:lang===code?"#2a1e08":"transparent",border:"none",color:lang===code?"#d4a017":"#c9a84c",fontSize:"0.82rem",cursor:"pointer",fontFamily:"inherit",borderBottom:"1px solid #2a1e08"}}>
                <span style={{fontSize:"1.1rem"}}>{LANG_FLAGS[code]}</span>
                <span style={{color:lang===code?"#d4a017":"#c9a84c"}}>{LANG_NAMES[code]}</span>
              </button>
            ))}
          </div>
        )}
        <button onClick={()=>setLangOpen(!langOpen)} style={{background:"linear-gradient(135deg,#2d1a00,#1a0e00)",border:"2px solid #8b6914",borderRadius:24,height:40,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",boxShadow:"0 4px 15px rgba(0,0,0,0.5)"}}>
          <span style={{fontSize:"0.78rem",color:"#d4a017",fontFamily:"Georgia,serif",fontWeight:"bold",letterSpacing:"0.08em"}}>{lang.toUpperCase()}</span>
        </button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
